spring.application.name=expense-tracker

# ===============================
# DATABASE CONFIGURATION (PostgreSQL Neon / Env configuration)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-rapid-tooth-aiyniyxv.c-4.us-east-1.aws.neon.tech:5432/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_gYQHzpNfer28}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Initial Schema file
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Server Port (dynamic for cloud environments like Render)
server.port=${PORT:8080}

# Hikari Connection Pool Settings for Serverless/Resource-constrained database
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# Tomcat Thread Optimization (reduces JVM memory footprint)
server.tomcat.threads.max=20

